{% extends "base.html" %} {% block title %}Create Subject{% endblock %} {% block content %}

<div class="mb-6">
    <h1 class="page-title">Create New Subject</h1>
    <p class="page-subtitle">Add a new subject to the system</p>
</div>

<div class="card max-w-lg mx-auto">
    <div class="card-header">
        <h2 class="font-bold text-gray-900 text-base">Subject Details</h2>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    Subject Name
                </label>
                <input type="text" name="subject_name" required placeholder="e.g. Computer Science" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm 
                           focus:outline-none focus:ring-2 focus:ring-maroon-400">
            </div>
            <div class="flex gap-3">
                <button type="submit" class="btn-primary flex-1 text-sm py-2">
                    <i class="fas fa-plus mr-2"></i> Create Subject
                </button>
                <a href="{{ url_for('admin_dashboard') }}" class="btn-secondary flex-1 text-center text-sm py-2">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
